<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBTI · 他测结果</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="DBTI 人格镜像测试">
  <meta property="og:title" content="DBTI · 你眼中的 ta 是……">
  <meta property="og:description" content="你的观察风格是什么？你真的懂 ta 吗？">
  <meta property="og:image" content="https://dbti.zhexueyuan.com/assets/share-thumb.svg">
  <meta property="og:image:width" content="600">
  <meta property="og:image:height" content="600">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="DBTI · 你眼中的 ta 是……">
  <meta name="twitter:description" content="你的观察风格是什么？你真的懂 ta 吗？">
  <meta name="twitter:image" content="https://dbti.zhexueyuan.com/assets/share-thumb.svg">
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    /* ===== 层级标题 ===== */
    .layer-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ===== 第一层：人格结果 ===== */
    .result-hero { text-align: center; margin-bottom: 8px; }
    .result-for {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .result-for strong { color: var(--accent); font-weight: 700; }
    .result-type-code {
      font-size: 2.6rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .result-type-cn {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .result-badge {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 18px;
    }
    .result-observer-desc {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.75;
      text-align: left;
      margin-bottom: 20px;
    }

    /* 雷达图 */
    .radar-wrap {
      text-align: center;
      margin: 0 -8px 4px;
    }
    .radar-wrap canvas { max-width: 100%; }

    /* ===== 层分隔 ===== */
    .layer-sep {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ===== 第二层：观察风格 ===== */
    .observer-card {
      background: var(--accent-light);
      border-radius: 10px;
      padding: 18px 16px;
    }
    .observer-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .observer-tagline {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-style: italic;
    }
    .observer-desc {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.7;
    }

    /* ===== 第三层：邀请入口 ===== */
    .invite-btn {
      width: 100%;
      margin-bottom: 12px;
    }
    .invite-result {
      display: none;
      background: var(--accent-light);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .invite-result.show { display: block; }
    .invite-link-box {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .invite-link-text {
      flex: 1;
      font-size: 0.78rem;
      color: var(--text-secondary);
      word-break: break-all;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: monospace;
    }
    .btn-copy-invite {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 0.82rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font);
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.18s;
    }
    .btn-copy-invite:hover { background: var(--accent-hover); }
    .invite-hint {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ===== 操作按钮组 ===== */
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }
    .action-group a, .action-group button {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
    }

    /* ===== 入场动画 ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes radarZoom {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .anim-layer {
      opacity: 0;
      animation: fadeInUp 0.5s ease forwards;
    }
    .anim-layer:nth-child(1) { animation-delay: 0.15s; }
    .anim-layer:nth-child(2) { animation-delay: 0.4s; }
    .anim-layer:nth-child(3) { animation-delay: 0.65s; }
    .anim-layer:nth-child(4) { animation-delay: 0.9s; }
    .anim-radar {
      opacity: 0;
      transform-origin: center;
      animation: radarZoom 0.5s ease forwards;
      animation-delay: 0.5s;
    }

    /* ===== 错误页 ===== */
    .error-card {
      text-align: center;
      padding: 40px 24px;
    }
    .error-card h2 { margin-bottom: 12px; }
    .error-card p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div id="app">
    <section class="page active">
      <div class="card" id="result-card" style="padding: 32px 20px;">
        <p style="text-align:center;color:var(--text-secondary);font-size:0.9rem;">加载中…</p>
      </div>
    </section>
  </div>

  <script type="module">
    import { drawRadar }              from '/src/chart.js'
    import { calculateObserverStyle } from '/src/observer-style.js'
    import typeDescOther              from '/data/type-desc-other.js'
    import observerStyles             from '/data/observer-styles.js'

    // ===== 工具 =====
    async function loadJSON(path) {
      const res = await fetch(path)
      return res.json()
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.lineTo(x + w - r, y)
      ctx.quadraticCurveTo(x + w, y, x + w, y + r)
      ctx.lineTo(x + w, y + h - r)
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
      ctx.lineTo(x + r, y + h)
      ctx.quadraticCurveTo(x, y + h, x, y + h - r)
      ctx.lineTo(x, y + r)
      ctx.quadraticCurveTo(x, y, x + r, y)
      ctx.closePath()
    }

    function wrapText(ctx, text, maxW) {
      if (!text) return []
      const lines = []
      let line = ''
      for (const ch of text) {
        const test = line + ch
        if (ctx.measureText(test).width > maxW && line) {
          lines.push(line); line = ch
        } else { line = test }
      }
      if (line) lines.push(line)
      return lines
    }

    // ===== 主流程 =====
    const card = document.getElementById('result-card')
    const raw  = localStorage.getItem('dbti_other_result')

    if (!raw) {
      card.innerHTML = `
        <div class="error-card">
          <h2>没有找到测试结果</h2>
          <p>请先完成他测答题流程。</p>
          <a href="/other-test.html" class="btn btn-primary" style="display:inline-block;">去测试</a>
        </div>`
    } else {
      // 更新测试计数
      const _cnt = parseInt(localStorage.getItem('dbti_test_count') || '0')
      localStorage.setItem('dbti_test_count', String(_cnt + 1))

      const data       = JSON.parse(raw)
      const [dimensions] = await Promise.all([loadJSON('/data/dimensions.json')])

      // 重建 userLevels { S1: 'H', ... }
      const userLevels = {}
      dimensions.order.forEach((dim, i) => { userLevels[dim] = data.levels[i] || 'M' })

      // 观察风格
      const levelsArr    = data.levels.split('')
      const styleKey     = calculateObserverStyle(levelsArr)
      const style        = observerStyles[styleKey]
      const observerDesc = typeDescOther[data.type] || `在你眼中 ta 是 ${data.typeCn}。`

      // TOP5 HTML
      const top5HTML = (data.rankings || []).map((t, i) => `
        <div class="top-item">
          <span class="top-rank">#${i + 1}</span>
          <span class="top-code">${t.code}</span>
          <span class="top-name">${t.cn}</span>
          <span class="top-sim">${t.similarity}%</span>
        </div>`).join('')

      card.innerHTML = `
        <!-- ===== 第一层：人格 ===== -->
        <div class="anim-layer">
          <div class="layer-title">Ta 在你眼中</div>
          <div class="result-hero">
            <p class="result-for">你眼中的 <strong>${data.nickname}</strong></p>
            <div class="result-type-code">${data.type}</div>
            <div class="result-type-cn">${data.typeCn}</div>
            <div class="result-badge">匹配度 ${data.similarity}%</div>
          </div>
          <p class="result-observer-desc" id="observer-desc-text"></p>
          <div class="radar-wrap anim-radar">
            <canvas id="radar-chart" width="320" height="320"></canvas>
          </div>
          <details style="margin-top:12px;">
            <summary style="font-size:0.82rem;color:var(--text-secondary);cursor:pointer;margin-bottom:8px;">最佳匹配 TOP 5</summary>
            <div style="margin-top:4px;">${top5HTML}</div>
          </details>
        </div>

        <div class="layer-sep"></div>

        <!-- ===== 第二层：观察风格 ===== -->
        <div class="anim-layer">
          <div class="layer-title">你的观察风格</div>
          <div class="observer-card">
            <div class="observer-name" id="style-name"></div>
            <div class="observer-tagline" id="style-tagline"></div>
            <div class="observer-desc" id="style-desc"></div>
          </div>
        </div>

        <div class="layer-sep"></div>

        <!-- ===== 第三层：邀请入口 ===== -->
        <div class="anim-layer">
          <div class="layer-title">邀请对照</div>
          <button id="btn-invite" class="btn btn-primary invite-btn">发给 ta，让 ta 亲自测</button>
          <div class="invite-result" id="invite-result">
            <div class="invite-link-box">
              <span class="invite-link-text" id="invite-link-text"></span>
              <button class="btn-copy-invite" id="btn-copy-invite">复制</button>
            </div>
            <p class="invite-hint">ta 打开链接完成自测后，即可直接看到认知偏差报告。ta 也可以把对照链接发回给你查看。</p>
          </div>
        </div>

        <div class="layer-sep"></div>

        <!-- ===== 分享卡 ===== -->
        <div class="anim-layer">
          <div class="layer-title">分享</div>
          <button id="btn-share" class="btn btn-primary" style="width:100%;margin-bottom:10px;">生成分享卡片</button>
          <button id="btn-copy-text" class="btn btn-secondary" style="width:100%;margin-bottom:10px;">复制分享文案</button>

          <!-- ===== 底部操作 ===== -->
          <div class="action-group">
            <a href="/other-test.html" class="btn btn-secondary">再测一个 ta</a>
            <a href="/self-test.html"  class="btn btn-secondary">测测我自己</a>
            <a href="/"                class="btn btn-secondary">返回首页</a>
          </div>
          <div class="intro-credit" style="margin-top:20px;">
            <div>原创：蛆肉儿串儿（B站 UID417038183）</div>
            <div>开源逆向：pingfanfan/SBTI</div>
            <div>关系模式 &amp; 他测玩法：哲学园 · 拾柒年蝉 出品</div>
          </div>
        </div>
      `

      // 填充文本
      document.getElementById('observer-desc-text').textContent = observerDesc
      document.getElementById('style-name').textContent    = style.name
      document.getElementById('style-tagline').textContent = `「${style.tagline}」`
      document.getElementById('style-desc').textContent   = style.desc

      // 绘制雷达图
      const canvas = document.getElementById('radar-chart')
      drawRadar(canvas, userLevels, dimensions.order, dimensions.definitions)

      // ===== 邀请链接逻辑 =====
      document.getElementById('btn-invite').addEventListener('click', () => {
        const sessionId = Math.random().toString(36).slice(2, 10).toUpperCase()
        localStorage.setItem('dbti_session_' + sessionId, raw)

        // 把他测核心数据编码进 URL，支持跨设备对照
        const params = new URLSearchParams({
          d:      data.levels,
          t:      data.type,
          r:      data.relation || '',
          n:      data.nickname,
          tn:     data.typeCn,
          invite: sessionId,
        })
        const link = `https://sbti-dbti.pages.dev/self-test.html?${params}`
        document.getElementById('invite-link-text').textContent = link
        document.getElementById('invite-result').classList.add('show')
        document.getElementById('btn-invite').style.display = 'none'

        document.getElementById('btn-copy-invite').onclick = () => {
          const btn = document.getElementById('btn-copy-invite')
          // 优先用 clipboard API，降级用 execCommand
          const doCopy = () => {
            btn.textContent = '已复制!'
            setTimeout(() => { btn.textContent = '复制' }, 2000)
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(link).then(doCopy).catch(() => {
              // clipboard API 失败时 fallback
              const ta = document.createElement('textarea')
              ta.value = link
              ta.style.cssText = 'position:fixed;opacity:0'
              document.body.appendChild(ta)
              ta.select()
              document.execCommand('copy')
              document.body.removeChild(ta)
              doCopy()
            })
          } else {
            const ta = document.createElement('textarea')
            ta.value = link
            ta.style.cssText = 'position:fixed;opacity:0'
            document.body.appendChild(ta)
            ta.select()
            document.execCommand('copy')
            document.body.removeChild(ta)
            doCopy()
          }
        }
      })

      // ===== 分享卡生成 =====
      document.getElementById('btn-share').addEventListener('click', () => {
        generateShareCard(data, style, observerDesc)
      })

      // ===== 复制分享文案 =====
      document.getElementById('btn-copy-text').addEventListener('click', () => {
        const text = `我用 DBTI 测了一下我眼中的「${data.nickname}」，结果是 ${data.typeCn}！\n我的观察风格：${style.name}\n你也来测测？👉 dbti.zhexueyuan.com`
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('btn-copy-text')
          btn.textContent = '已复制 ✓'
          setTimeout(() => { btn.textContent = '复制分享文案' }, 2000)
        })
      })
    }

    // ===== Canvas 分享卡 =====
    function generateShareCard(data, style, observerDesc) {
      const dpr = 2
      const W = 750, H = 1000
      const cv = document.createElement('canvas')
      cv.width = W * dpr; cv.height = H * dpr
      const ctx = cv.getContext('2d')
      ctx.scale(dpr, dpr)

      const MID = W / 2
      const f = (sz, w = '400') =>
        `${w} ${sz}px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif`

      // ── 径向渐变背景 ──
      const grd = ctx.createRadialGradient(MID, 380, 60, MID, 380, 720)
      grd.addColorStop(0, '#1e3028')
      grd.addColorStop(1, '#0b1410')
      ctx.fillStyle = grd
      ctx.fillRect(0, 0, W, H)

      function sep(y) {
        ctx.save()
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'
        ctx.lineWidth = 0.5
        ctx.beginPath(); ctx.moveTo(56, y); ctx.lineTo(W - 56, y); ctx.stroke()
        ctx.restore()
      }

      // 提取第一句话（不超过 26 字）
      const dotIdx = observerDesc.indexOf('。')
      const excerpt = dotIdx > 0 && dotIdx < 30
        ? observerDesc.slice(0, dotIdx + 1)
        : (observerDesc.slice(0, 26) + (observerDesc.length > 26 ? '…' : ''))

      let y = 84

      // ── 顶部：标签 + 代号 ──
      ctx.textAlign = 'center'
      ctx.font = f(13, '500'); ctx.fillStyle = '#6fa878'
      ctx.fillText('我  眼  中  的', MID, y); y += 44

      ctx.font = f(32, '700'); ctx.fillStyle = '#e8f0ea'
      ctx.fillText(`「${data.nickname}」`, MID, y); y += 62

      sep(y); y += 62

      // ── TYPE CODE 区域（装饰 pill 背景）──
      ctx.font = f(86, '900')
      const codeW = ctx.measureText(data.type).width
      const pillW = codeW + 96, pillH = 116
      roundRect(ctx, MID - pillW / 2, y - 88, pillW, pillH, 18)
      const pillGrd = ctx.createLinearGradient(MID - pillW / 2, 0, MID + pillW / 2, 0)
      pillGrd.addColorStop(0, 'rgba(90,138,98,0.28)')
      pillGrd.addColorStop(1, 'rgba(90,138,98,0.10)')
      ctx.fillStyle = pillGrd; ctx.fill()

      ctx.font = f(86, '900'); ctx.fillStyle = '#5a8a62'
      ctx.fillText(data.type, MID, y); y += 50

      ctx.font = f(34, '700'); ctx.fillStyle = '#e8f0ea'
      ctx.fillText(data.typeCn, MID, y); y += 40

      ctx.font = f(15, '500'); ctx.fillStyle = '#7a9882'
      ctx.fillText(`匹配度 ${data.similarity}%`, MID, y); y += 58

      sep(y); y += 52

      // ── 短句摘录 ──
      ctx.font = f(20, '400'); ctx.fillStyle = '#b0c4b8'
      const excerptLines = wrapText(ctx, excerpt, W - 160)
      for (const line of excerptLines) {
        ctx.fillText(line, MID, y); y += 32
      }
      y += 28

      sep(y); y += 58

      // ── 观察风格 ──
      ctx.font = f(12, '600'); ctx.fillStyle = '#5a8a62'
      ctx.fillText('我  的  观  察  风  格', MID, y); y += 46

      ctx.font = f(38, '800'); ctx.fillStyle = '#e8f0ea'
      ctx.fillText(style.name, MID, y); y += 54

      ctx.font = f(19, '400'); ctx.fillStyle = '#8fa893'
      ctx.fillText(`「${style.tagline}」`, MID, y); y += 46

      ctx.font = f(17, '400'); ctx.fillStyle = '#7a9882'
      const styleDescLines = wrapText(ctx, style.desc, W - 160)
      for (const line of styleDescLines.slice(0, 2)) {
        ctx.fillText(line, MID, y); y += 28
      }

      // ── 底部水印 ──
      sep(H - 76)
      ctx.font = f(14, '400'); ctx.fillStyle = '#4a5e4d'
      ctx.fillText('DBTI · dbti.zhexueyuan.com', MID, H - 50)
      ctx.font = f(12, '400'); ctx.fillStyle = '#2e3d32'
      ctx.fillText('仅供娱乐，好玩为主，不要当判决书', MID, H - 26)

      const link = document.createElement('a')
      link.download = `DBTI-${data.type}-${data.nickname}.png`
      link.href = cv.toDataURL('image/png')
      link.click()
    }
  </script>

  <!-- TOP5 样式复用 -->
  <style>
    .top-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .top-item:last-child { border-bottom: none; }
    .top-rank { color: var(--text-secondary); font-size: 0.78rem; width: 24px; }
    .top-code { font-weight: 700; color: var(--accent); flex: 0 0 72px; }
    .top-name { flex: 1; color: var(--text); }
    .top-sim  { color: var(--text-secondary); font-size: 0.8rem; }

    details summary { user-select: none; }
    details[open] summary { margin-bottom: 8px; }
  </style>
</body>
</html>
