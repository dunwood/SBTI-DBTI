  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #141c18;
      --card-bg: #1e2a22;
      --card-border: #2e3d32;
      --text: #e8f0ea;
      --text-secondary: #8fa893;
      --accent: #5a8a62;
      --accent-hover: #6fa878;
      --accent-disabled: #3a5040;
      --accent-disabled-text: #5a7060;
      --font: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .logo {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 40px;
    }

    @media (min-width: 400px) {
      .btn-group {
        flex-direction: row;
        justify-content: center;
      }
    }

    .btn {
      display: block;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
      text-decoration: none;
      padding: 16px 32px;
      line-height: 1.3;
    }

    .btn-self {
      background: var(--accent);
      color: #fff;
    }

    .btn-self:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .btn-self:active {
      transform: translateY(0);
    }

    .btn-other {
      background: var(--card-bg);
      color: var(--accent-disabled-text);
      border: 1.5px solid var(--card-border);
    }

    .btn-label {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .btn-hint {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      margin-top: 4px;
      opacity: 0.7;
    }

    .divider {
      height: 1px;
      background: var(--card-border);
      margin: 0 auto 32px;
      max-width: 320px;
    }

    .disclaimer {
      font-size: 0.8rem;
      color: var(--text-secondary);
      opacity: 0.7;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .credits {
      font-size: 0.78rem;
      color: var(--text-secondary);
      opacity: 0.55;
      line-height: 2;
    }

    .credits a {
      color: inherit;
      text-decoration: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container {
      animation: fadeIn 0.4s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">DBTI</h1>
    <p class="subtitle">你以为的 ta，和 ta 以为的自己</p>

    <div class="btn-group">
      <a href="/self-test.html" class="btn btn-self">
        <span class="btn-label">我测我自己</span>
        <span class="btn-hint">看看你是什么人格</span>
      </a>
      <a href="/other-test.html" class="btn btn-other">
        <span class="btn-label">我眼中的 ta</span>
        <span class="btn-hint">看看你多懂 ta</span>
      </a>
    </div>

    <div class="divider"></div>

    <p class="disclaimer">仅供娱乐，好玩为主，不要当判决书</p>

    </div>
  </div>
</body>
